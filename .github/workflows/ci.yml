name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # lint step omitted: ESLint not yet configured (next lint is interactive). Add `bun run lint` once eslint config lands (issue #217 follow-up).
      - run: bun run build
      - run: bun run test:run
