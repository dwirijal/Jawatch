name: jawatch

# Fully self-hosted jawatch stack — no Sanka/upstream fallback, no Supabase Postgres.
# - app: Next.js standalone (state: better-auth sessions + library_* tables)
# - jawatch-api: Go content API (media/genres/episodes/chapters), serves from its own PG data
# - Both connect to the shared dwizzyOS infra: DOS-pgb (pgbouncer -> DOS-pg), DOS-vk (valkey)
# - app joins the external `dwizzyOS` network so Caddy (jawatch.web.id -> jawatch:3000) can reach it
# - jawatch-api + app also join `gebelin_backend` (external, internal-only) to reach DOS-pgb/DOS-vk directly

x-restarts: &restart_policy
  restart: unless-stopped

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        JAWATCH_USE_LOCAL_API: "1"
        JAWATCH_LOCAL_API_URL: "http://jawatch-api:8080"
        JAWATCH_LOCAL_API_TIMEOUT_MS: "4000"
    image: jawatch:local
    container_name: jawatch
    <<: *restart_policy
    depends_on:
      jawatch-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      # library_* state tables live in the same DOS-pg database as jawatch-api's media tables,
      # reached through the shared pgbouncer (transaction pool).
      sb_POSTGRES_URL: postgres://dwizzy:${DOS_PG_PASSWORD}@DOS-pgb:6432/dwizzyos?sslmode=disable
      sb_POSTGRES_PRISMA_URL: postgres://dwizzy:${DOS_PG_PASSWORD}@DOS-pgb:6432/dwizzyos?sslmode=disable
      sb_POSTGRES_URL_NON_POOLING: postgres://dwizzy:${DOS_PG_PASSWORD}@DOS-pgb:6432/dwizzyos?sslmode=disable
      sb_POSTGRES_HOST: DOS-pgb
      sb_POSTGRES_DATABASE: dwizzyos
      sb_POSTGRES_USER: dwizzy
      sb_POSTGRES_PASSWORD: ${DOS_PG_PASSWORD}
      sb_POSTGRES_CA_CERT: ""
      VALKEY_URL: redis://:${DOS_VALKEY_PASSWORD}@DOS-vk:6379
      JAWATCH_USE_LOCAL_API: "1"
      JAWATCH_LOCAL_API_URL: "http://jawatch-api:8080"
      JAWATCH_LOCAL_API_TIMEOUT_MS: "4000"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://jawatch.web.id}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-https://jawatch.web.id}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    networks:
      - dwizzyOS
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          cpus: "1.0"
          memory: 2g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  jawatch-api:
    build:
      context: ../../jawatch-api
      dockerfile: Dockerfile
    image: jawatch-api:local
    container_name: jawatch-api
    <<: *restart_policy
    environment:
      JAWATCH_API_LISTEN: ":8080"
      JAWATCH_DATABASE_URL: postgres://dwizzy:${DOS_PG_PASSWORD}@DOS-pgb:6432/dwizzyos?sslmode=disable
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/media?limit=1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  dwizzyOS:
    external: true
  backend:
    name: gebelin_backend
    external: true
