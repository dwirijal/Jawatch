[databases]
; Front Supabase Postgres (non-pooling 5432 endpoint) with a local pool.
; Supabase's own pooler (6543) should NOT be double-pooled — point this at 5432.
jawatch = host=db.krddamyzkrjmonwbxzas.supabase.co port=5432 dbname=postgres user=postgres.krddamyzkrjmonwbxzas

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
server_idle_timeout = 60
server_lifetime = 3600
log_connections = 0
log_disconnections = 0
application_name_add_host = 1
ignore_startup_parameters = extra_float_digits
