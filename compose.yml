services:
  jawatch:
    container_name: jawatch
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.dwizzy.my.id/v1
      - INTERNAL_API_URL=http://avicenna:8080/v1
    networks:
      - proxy
      - dwizzyOS

networks:
  proxy:
    external: true
  dwizzyOS:
    external: true